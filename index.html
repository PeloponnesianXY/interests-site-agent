<script>
  (function () {
    function createIframeFromShell(shell) {
      var src = shell.getAttribute("data-src");
      var title = shell.getAttribute("data-title") || "Spotify Embed";
      if (!src) return;
      var frame = document.createElement("iframe");
      frame.className = "spotify";
      frame.setAttribute("title", title);
      frame.setAttribute("src", src);
      frame.setAttribute("width", "100%");
      frame.setAttribute("height", "152");
      frame.setAttribute("frameborder", "0");
      frame.setAttribute(
        "allow",
        "autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      );
      frame.setAttribute("loading", "lazy");
      frame.setAttribute("scrolling", "no");
      shell.replaceWith(frame);
    }

    function loadEmbeds(tile) {
      if (!tile) return;
      tile.querySelectorAll(".spotify-shell[data-src]").forEach(function (shell) {
        createIframeFromShell(shell);
      });
    }

    function init() {
      var tiles = document.querySelectorAll(".styles-grid .style-tile");
      tiles.forEach(function (tile) {
        tile.addEventListener("mouseenter", function () {
          loadEmbeds(tile);
        });
        tile.addEventListener("focusin", function () {
          loadEmbeds(tile);
        });
        tile.addEventListener("click", function () {
          tile.classList.toggle("is-open");
          loadEmbeds(tile);
        });
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
</script>
