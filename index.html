<script>
  (function () {
    function loadEmbeds(tile) {
      if (!tile) return;
      tile.querySelectorAll("iframe.lazy-spotify[data-src]").forEach(function (frame) {
        if (!frame.dataset.loaded) {
          frame.src = frame.dataset.src;
          frame.dataset.loaded = "1";
        }
      });
    }

    function init() {
      var tiles = document.querySelectorAll(".styles-grid .style-tile");
      tiles.forEach(function (tile) {
        tile.addEventListener("mouseenter", function () {
          loadEmbeds(tile);
        });
        tile.addEventListener("focusin", function () {
          loadEmbeds(tile);
        });
        tile.addEventListener("click", function () {
          tile.classList.toggle("is-open");
          loadEmbeds(tile);
        });
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
</script>
